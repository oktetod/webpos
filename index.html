<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joko Absensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { Settings, Users, Save, Clock, CheckCircle, LayoutDashboard, Trash2, CalendarDays, AlertCircle, LogOut, Lock, User as UserIcon, ArrowLeft, UserMinus, UserPlus, Shield, Send } from 'https://esm.sh/lucide-react@0.344.0';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        const GITHUB_USERNAME = "oktetod";
        const GITHUB_REPO     = "webpos";
        const WA_BOSS_NUMBER  = "6285815042276";

        const firebaseConfig = {
            apiKey: "AIzaSyA9aXzUB7rnwNEAe7XIWl1ym1PDSFevMhg",
            authDomain: "absen-2b38f.firebaseapp.com",
            projectId: "absen-2b38f",
            storageBucket: "absen-2b38f.firebasestorage.app",
            messagingSenderId: "696925605556",
            appId: "1:696925605556:web:7be8b9429cf58f5e4091e1"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);
        const myAppId = 'joko-absen-app';

        const formatShortDate = (ds) => {
            const d = new Date(ds);
            return { day: ['Min','Sen','Sel','Rab','Kam','Jum','Sab'][d.getDay()], date: d.getDate() };
        };

        function App() {
            const [user,            setUser]           = useState(null);
            const [bgImages,        setBgImages]       = useState([]);
            const [bgIdx,           setBgIdx]          = useState(0);
            const [isAuth,          setIsAuth]         = useState(localStorage.getItem('joko_admin_logged_in') === 'true');
            const [showLogin,       setShowLogin]      = useState(false);
            const [loginUser,       setLoginUser]      = useState('');
            const [loginPass,       setLoginPass]      = useState('');
            const [loginErr,        setLoginErr]       = useState('');
            const [tab,             setTab]            = useState('dashboard');
            const [employees,       setEmployees]      = useState([]);
            const [cycles,          setCycles]         = useState([]);
            const [cycleId,         setCycleId]        = useState('');
            const [attendance,      setAttendance]     = useState({});
            const [inputs,          setInputs]         = useState({});
            const [activeKey,       setActiveKey]      = useState(null);
            const [week,            setWeek]           = useState(1);
            const [expStatus,       setExpStatus]      = useState('');
            const [newEmpName,      setNewEmpName]     = useState('');
            const [newEmpMandor,    setNewEmpMandor]   = useState(false);
            const [newCycleStart,   setNewCycleStart]  = useState('');
            const exportRef = useRef(null);

            useEffect(() => {
                fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/`)
                    .then(r => r.json()).then(data => {
                        if (!Array.isArray(data)) return;
                        const imgs = data.filter(i => i.type==='file' && /\.(jpg|jpeg|png)$/i.test(i.name)).map(i => i.download_url);
                        if (imgs.length) setBgImages(imgs);
                    }).catch(() => {});
            }, []);

            useEffect(() => {
                if (!bgImages.length) return;
                const id = setInterval(() => setBgIdx(p => (p+1)%bgImages.length), 10000);
                return () => clearInterval(id);
            }, [bgImages]);

            useEffect(() => {
                signInAnonymously(auth).catch(console.error);
                return onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user) return;
                const col = p => collection(db,'artifacts',myAppId,'public','data',p);
                const u1 = onSnapshot(col('employees'), s => setEmployees(s.docs.map(d => ({id:d.id,...d.data()}))));
                const u2 = onSnapshot(col('cycles'), s => {
                    const arr = s.docs.map(d => ({id:d.id,...d.data()})).sort((a,b) => new Date(b.startDate)-new Date(a.startDate));
                    setCycles(arr);
                    setCycleId(p => (!p && arr.length) ? arr[0].id : p);
                });
                const u3 = onSnapshot(col('attendance'), s => {
                    const obj = {}; s.forEach(d => { obj[d.id]=d.data(); }); setAttendance(obj);
                });
                return () => { u1(); u2(); u3(); };
            }, [user]);

            useEffect(() => {
                setInputs(prev => {
                    const next = {...prev};
                    Object.entries(attendance).forEach(([date,byEmp]) => {
                        Object.entries(byEmp).forEach(([empId,val]) => {
                            const k = `${date}_${empId}`;
                            if (k !== activeKey) next[k] = val;
                        });
                    });
                    return next;
                });
            }, [attendance]); // eslint-disable-line

            const getCycleDates = () => {
                const c = cycles.find(c => c.id===cycleId);
                if (!c) return [];
                const dates=[]; let cur=new Date(c.startDate); const end=new Date(c.endDate);
                while(cur<=end){dates.push(cur.toISOString().split('T')[0]);cur.setDate(cur.getDate()+1);}
                return dates;
            };
            const getTotal = (empId, dates) => dates.reduce((s,d) => s+(parseFloat(attendance[d]?.[empId])||0), 0);

            const cycleDates     = getCycleDates();
            const activeCycle    = cycles.find(c => c.id===cycleId);
            const isMulti        = cycleDates.length > 7;
            const shownDates     = isMulti ? cycleDates.slice((week-1)*7, week*7) : cycleDates;
            const showTotal      = !isMulti || week===2;

            const sorted = [...employees].sort((a,b) => {
                if(a.isMandor&&!b.isMandor) return -1;
                if(!a.isMandor&&b.isMandor) return 1;
                return a.name.localeCompare(b.name);
            });
            const visible   = sorted.filter(e => e.isActive!==false || getTotal(e.id,cycleDates)>0);
            const actives   = sorted.filter(e => e.isActive!==false);
            const inactives = sorted.filter(e => e.isActive===false);
            const mandor    = sorted.find(e => e.isMandor && e.isActive!==false);

            const addEmp = async e => {
                e.preventDefault();
                if(!newEmpName.trim()||!user||!isAuth) return;
                await addDoc(collection(db,'artifacts',myAppId,'public','data','employees'),
                    {name:newEmpName.toUpperCase(),isActive:true,isMandor:newEmpMandor,createdAt:new Date().toISOString()});
                setNewEmpName(''); setNewEmpMandor(false);
            };
            const delEmp = async id => { if(user&&isAuth&&window.confirm("Hapus permanen?")) await deleteDoc(doc(db,'artifacts',myAppId,'public','data','employees',id)); };
            const toggleActive = async (id,cur) => { if(user&&isAuth) await setDoc(doc(db,'artifacts',myAppId,'public','data','employees',id),{isActive:!cur},{merge:true}); };
            const toggleMandor = async (id,cur) => { if(user&&isAuth) await setDoc(doc(db,'artifacts',myAppId,'public','data','employees',id),{isMandor:!cur},{merge:true}); };
            const createCycle = async e => {
                e.preventDefault();
                if(!newCycleStart||!user||!isAuth) return;
                const s=new Date(newCycleStart); const en=new Date(s); en.setDate(en.getDate()+13);
                const pay=new Date(s); pay.setDate(pay.getDate()+14);
                await addDoc(collection(db,'artifacts',myAppId,'public','data','cycles'),{
                    startDate:s.toISOString().split('T')[0],endDate:en.toISOString().split('T')[0],
                    payDate:pay.toISOString().split('T')[0],createdAt:new Date().toISOString()});
                setNewCycleStart('');
            };
            const onFocus  = (empId,date) => setActiveKey(`${date}_${empId}`);
            const onChange = (empId,date,val) => { if(!isAuth) return; setInputs(p => ({...p,[`${date}_${empId}`]:val})); };
            const onBlur   = async (empId,date) => {
                if(!user||!isAuth) return; setActiveKey(null);
                const raw=inputs[`${date}_${empId}`]; const val=parseFloat(raw);
                const save=(!raw||raw===''||isNaN(val))?0:val;
                await setDoc(doc(db,'artifacts',myAppId,'public','data','attendance',date),{[empId]:save},{merge:true});
                setInputs(p => ({...p,[`${date}_${empId}`]:save===0?'':save}));
            };
            const onKeyDown = (e,date,idx) => {
                if(!isAuth||(e.key!=='Enter'&&e.keyCode!==13)) return;
                e.preventDefault();
                const nx=document.getElementById(`inp-${date}-${idx+1}`);
                if(nx){nx.focus();nx.select();}else e.target.blur();
            };
            const handleLogin = e => {
                e.preventDefault();
                if(loginUser.toLowerCase()==='bayu'&&loginPass==='008'){
                    setIsAuth(true); localStorage.setItem('joko_admin_logged_in','true');
                    setLoginErr(''); setShowLogin(false);
                } else setLoginErr('Username atau Password salah!');
            };
            const handleLogout = () => {
                setIsAuth(false); localStorage.removeItem('joko_admin_logged_in');
                setLoginUser(''); setLoginPass(''); setTab('dashboard');
            };

            /* ══ EXPORT & WA ══════════════════════════════════════════ */
            const openWABoss = () => {
                const msg = encodeURIComponent(
                    `Halo Boss, terlampir laporan absensi ` +
                    `${activeCycle?.startDate??''} s/d ${activeCycle?.endDate??''}. ` +
                    `Silakan attach gambar dari galeri/unduhan.`
                );
                const waApp = `whatsapp://send?phone=${WA_BOSS_NUMBER}&text=${msg}`;
                const waWeb = `https://wa.me/${WA_BOSS_NUMBER}?text=${msg}`;
                const iframe = document.createElement('iframe');
                iframe.style.cssText = 'display:none;width:0;height:0;border:none;';
                iframe.src = waApp;
                document.body.appendChild(iframe);
                setTimeout(() => {
                    try { document.body.removeChild(iframe); } catch(_){}
                    window.open(waWeb, '_blank');
                }, 1500);
            };

            const handleExport = async () => {
                if(!exportRef.current||!cycleDates.length) return;
                setExpStatus('exporting');
                const el = exportRef.current;
                try {
                    Object.assign(el.style, {
                        display:'block', visibility:'visible',
                        position:'fixed', left:'-99999px', top:'0',
                        zIndex:'-1'
                    });
                    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

                    const canvas = await window.html2canvas(el, {
                        scale: 3,
                        backgroundColor: '#ffffff',
                        useCORS: false,
                        allowTaint: true,
                        logging: false,
                        imageTimeout: 0,
                        onclone: cloneDoc => {
                            cloneDoc.querySelectorAll('*').forEach(n => {
                                try { if(n.style?.backgroundImage && n.style.backgroundImage!=='none') n.style.backgroundImage='none'; } catch(_){}
                            });
                            cloneDoc.querySelectorAll('link[rel="stylesheet"],script[src]').forEach(n => {
                                try { n.parentNode.removeChild(n); } catch(_){}
                            });
                        }
                    });

                    Object.assign(el.style, { display:'none', visibility:'hidden', left:'-99999px' });

                    const blob = await new Promise(res => canvas.toBlob(res, 'image/png', 1.0));
                    const fname = `absensi_${activeCycle?.startDate??'export'}_sd_${activeCycle?.endDate??''}.png`;
                    const file  = new File([blob], fname, {type:'image/png'});

                    if(navigator.share && navigator.canShare?.({files:[file]})) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'Laporan Absensi',
                                text: `Absensi ${activeCycle?.startDate} s/d ${activeCycle?.endDate}`
                            });
                            openWABoss();
                            setExpStatus('done');
                            setTimeout(() => setExpStatus(''), 6000);
                            return;
                        } catch(err) {
                            if(err.name !== 'AbortError') throw err;
                        }
                    }

                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href=url; a.download=fname;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 3000);

                    setTimeout(() => openWABoss(), 1800);

                    setExpStatus('done');
                    setTimeout(() => setExpStatus(''), 6000);
                } catch(err) {
                    console.error('Export error:', err);
                    Object.assign(el.style, {display:'none', visibility:'hidden'});
                    setExpStatus('error');
                    setTimeout(() => setExpStatus(''), 5000);
                }
            };

            if(!user) return (
                <div className="flex items-center justify-center h-screen bg-gray-50">
                    <div className="text-lg font-medium text-blue-600 animate-pulse flex items-center gap-2">
                        <Clock className="w-6 h-6 animate-spin"/> Memuat Sistem...
                    </div>
                </div>
            );

            const bgStyle = {
                backgroundImage: bgImages.length ? `url('${bgImages[bgIdx]}')` : 'none',
                backgroundSize:'cover', backgroundPosition:'center',
                transition:'background-image 1.5s ease-in-out', backgroundColor:'#f3f4f6'
            };

            /* ── Hitung ukuran adaptif export ── */
            const ec       = visible.length;
            const rowH     = ec<=6?34 : ec<=12?27 : ec<=18?22 : 18;
            const cfSz     = ec<=6?10 : ec<=12?8.5: ec<=18?7.5: 6.5;
            const nfSz     = ec<=6?9  : ec<=12?8  : ec<=18?7  : 6;
            const EW       = 390;                               // lebar div export
            const PAD      = 12;                                // padding kiri & kanan (masing-masing)
            const NC       = 72; const TC = 38;
            /* ── FIX: kurangi padding (PAD*2) saat hitung lebar kolom tanggal ── */
            const DC       = Math.floor((EW - PAD*2 - NC - TC) / Math.max(cycleDates.length, 1));

            /* ─────────────────────── LOGIN ─────────────────────── */
            if(showLogin && !isAuth) return (
                <div className="min-h-screen flex flex-col justify-center py-12 sm:px-6 relative overflow-hidden">
                    <div className="fixed inset-0 z-[-2]" style={bgStyle}/>
                    <div className="fixed inset-0 z-[-1] bg-black/25"/>
                    <button onClick={() => setShowLogin(false)} className="absolute top-4 left-4 z-10 flex items-center gap-2 text-white bg-white/20 backdrop-blur-md px-4 py-2 rounded-xl border border-white/40 font-bold">
                        <ArrowLeft className="w-5 h-5"/> Kembali
                    </button>
                    <div className="sm:mx-auto sm:w-full sm:max-w-md mt-8 z-10 text-center">
                        <div className="flex justify-center"><div className="bg-gradient-to-br from-blue-600/90 to-indigo-600/90 p-4 rounded-2xl text-white shadow-lg"><Lock className="w-10 h-10"/></div></div>
                        <h2 className="mt-6 text-3xl font-black text-white uppercase drop-shadow-lg">Login Admin</h2>
                    </div>
                    <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md px-4 z-10">
                        <div className="bg-white/30 backdrop-blur-md py-8 px-6 shadow-2xl rounded-2xl border border-white/50">
                            <form className="space-y-6" onSubmit={handleLogin}>
                                {loginErr && <div className="bg-red-500/80 p-4 rounded-md flex gap-3"><AlertCircle className="w-5 h-5 text-white flex-shrink-0"/><p className="text-sm text-white font-bold">{loginErr}</p></div>}
                                {[['text','Username',loginUser,setLoginUser,<UserIcon className="h-5 w-5 text-gray-700"/>],
                                  ['password','Password',loginPass,setLoginPass,<Lock className="h-5 w-5 text-gray-700"/>]
                                ].map(([type,label,val,setter,icon]) => (
                                    <div key={label}>
                                        <label className="block text-sm font-black text-white mb-1.5 uppercase">{label}</label>
                                        <div className="relative">
                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center">{icon}</div>
                                            <input type={type} required value={val} onChange={e => setter(e.target.value)} className="focus:ring-2 focus:ring-blue-500 block w-full pl-10 text-sm border-white/50 rounded-xl py-3.5 bg-white/60 backdrop-blur-sm border outline-none font-black text-gray-900 uppercase placeholder-gray-600" placeholder={`${label}...`}/>
                                        </div>
                                    </div>
                                ))}
                                <button type="submit" className="w-full py-3.5 rounded-xl text-sm font-black text-white bg-blue-600/80 hover:bg-blue-700/90 uppercase tracking-wider">MASUK</button>
                            </form>
                        </div>
                    </div>
                </div>
            );

            /* ─────────────────────── MAIN ─────────────────────── */
            return (
                <div className="min-h-screen font-sans flex flex-col relative overflow-hidden">
                    <div className="fixed inset-0 z-[-2]" style={bgStyle}/>
                    <div className="fixed inset-0 z-[-1] bg-black/10"/>
                    <style>{`
                        input[type=number]::-webkit-inner-spin-button,
                        input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
                        input[type=number]{-moz-appearance:textfield;}
                        #joko-export{display:none;visibility:hidden;position:fixed;left:-99999px;top:0;z-index:-9999;}
                    `}</style>

                    {/* HEADER */}
                    <header className="bg-white/30 backdrop-blur-md shadow-lg sticky top-0 z-50 border-b border-white/50">
                        <div className="max-w-7xl mx-auto px-2 sm:px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600/90 p-2 rounded-xl text-white shadow-md"><CalendarDays className="w-5 h-5"/></div>
                                <h1 className="text-lg font-black text-gray-900 hidden sm:block tracking-tight uppercase">Joko<span className="text-blue-800">Absensi</span></h1>
                            </div>
                            <div className="flex items-center gap-2 sm:gap-3">
                                <div className="flex space-x-1 bg-white/20 p-1.5 rounded-2xl border border-white/40 backdrop-blur-sm">
                                    {[['dashboard','Absen',<LayoutDashboard className="w-3.5 h-3.5"/>],
                                      ...(isAuth?[['karyawan','Karyawan',<Users className="w-3.5 h-3.5"/>],['siklus','Siklus',<Settings className="w-3.5 h-3.5"/>]]:[])
                                    ].map(([t,l,ic]) => (
                                        <button key={t} onClick={() => setTab(t)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] sm:text-sm font-black transition-all ${tab===t?'bg-blue-600/90 text-white shadow-md':'text-gray-800 hover:bg-white/40'}`}>
                                            {ic} {l}
                                        </button>
                                    ))}
                                </div>
                                {isAuth
                                    ? <button onClick={handleLogout} className="bg-red-500/80 text-white p-2 rounded-xl hover:bg-red-600 shadow-md border border-red-300/50"><LogOut className="w-4 h-4 sm:w-5 sm:h-5"/></button>
                                    : <button onClick={() => setShowLogin(true)} className="bg-blue-600/90 text-white px-3 py-1.5 rounded-xl text-xs sm:text-sm font-black flex items-center gap-1.5 uppercase shadow-md border border-white/30"><Lock className="w-3.5 h-3.5"/> Admin</button>
                                }
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full px-2 sm:px-6 py-6 z-10 relative">

                        {/* ── DASHBOARD ── */}
                        {tab==='dashboard' && (
                            <div className="bg-white/40 backdrop-blur-md rounded-2xl shadow-2xl border border-white/60 overflow-hidden">
                                {!isAuth && (
                                    <div className="bg-blue-900/80 p-3 text-center text-sm font-black text-white border-b border-white/20 flex justify-center items-center gap-2 uppercase tracking-widest">
                                        <AlertCircle className="w-4 h-4"/> Mode Akses Publik (Hanya Baca)
                                    </div>
                                )}
                                <div className="p-4 sm:p-5 bg-white/30 border-b border-white/50 flex flex-col sm:flex-row justify-between items-center gap-4">
                                    <select value={cycleId} onChange={e => {setCycleId(e.target.value);setWeek(1);}} className="w-full sm:w-64 border-2 border-white/60 rounded-xl px-3 py-2.5 text-sm font-black text-gray-900 bg-white/50 backdrop-blur-md focus:ring-2 focus:ring-blue-600 outline-none cursor-pointer shadow-sm">
                                        {!cycles.length && <option value="">Belum ada siklus</option>}
                                        {cycles.map(c => <option key={c.id} value={c.id}>Tgl {new Date(c.startDate).toLocaleDateString('id-ID',{day:'numeric',month:'short'})} - {new Date(c.endDate).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}</option>)}
                                    </select>
                                    <div className="flex w-full sm:w-auto gap-3">
                                        {isMulti && (
                                            <div className="flex bg-white/30 p-1.5 rounded-xl flex-1 sm:w-[240px] gap-1 border border-white/50 shadow-inner">
                                                {[1,2].map(w => <button key={w} onClick={() => setWeek(w)} className={`flex-1 py-1.5 text-xs font-black rounded-lg transition-all uppercase ${week===w?'bg-blue-600/90 text-white shadow-md':'text-gray-900 hover:bg-white/50'}`}>Minggu {w}</button>)}
                                            </div>
                                        )}
                                        {isAuth && (
                                            <button onClick={handleExport} disabled={!cycleDates.length||expStatus==='exporting'}
                                                className={`backdrop-blur-md border border-white/30 text-white px-4 py-1.5 rounded-xl text-xs font-black shadow-lg flex items-center gap-2 uppercase tracking-wide transition-all disabled:opacity-50
                                                    ${expStatus==='exporting'?'bg-yellow-500/90 animate-pulse':expStatus==='done'?'bg-green-600/90':expStatus==='error'?'bg-red-600/90':'bg-green-600/90 hover:bg-green-700'}`}>
                                                {expStatus==='exporting'?<><Clock className="w-4 h-4 animate-spin"/><span className="hidden sm:inline">Proses...</span></>:
                                                 expStatus==='done'?<><CheckCircle className="w-4 h-4"/><span className="hidden sm:inline">Berhasil!</span></>:
                                                 expStatus==='error'?<><AlertCircle className="w-4 h-4"/><span className="hidden sm:inline">Gagal</span></>:
                                                 <><Send className="w-4 h-4"/><span className="hidden sm:inline">Export & WA</span></>}
                                            </button>
                                        )}
                                    </div>
                                </div>

                                {!visible.length
                                    ? <div className="p-12 text-center text-gray-900 text-sm font-black uppercase">Tidak ada karyawan.</div>
                                    : !cycleDates.length
                                        ? <div className="p-12 text-center text-gray-900 text-sm font-black uppercase">Belum ada siklus aktif.</div>
                                        : (
                                    <div className="w-full overflow-x-auto">
                                        <table className="w-full text-xs text-left border-collapse table-fixed">
                                            <thead className="bg-white/50 backdrop-blur-md text-gray-900 border-b-2 border-white/60">
                                                <tr>
                                                    <th className="px-2 py-3 border-r border-white/50 font-black w-[80px] sm:w-[120px] align-bottom"><div className="text-[10px] text-gray-800 uppercase tracking-widest">Karyawan</div></th>
                                                    {shownDates.map(date => {
                                                        const {day,date:dn}=formatShortDate(date); const sun=day==='Min';
                                                        return <th key={date} className={`border-r border-white/50 text-center p-0 align-middle ${sun?'bg-red-500/20':''}`}>
                                                            <div className="text-[9px] uppercase font-black pt-2 opacity-80 tracking-widest">{day}</div>
                                                            <div className={`text-sm font-black pb-2 ${sun?'text-red-800':'text-gray-900'}`}>{dn}</div>
                                                        </th>;
                                                    })}
                                                    {showTotal && <th className="border-l border-white/50 font-black text-center w-[45px] sm:w-[60px] bg-indigo-600/80 text-white align-middle"><div className="text-[9px] pt-2 tracking-widest">TOT</div><div className="text-[10px] pb-2">JAM</div></th>}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {visible.map((emp,idx) => {
                                                    const inactive=emp.isActive===false;
                                                    const canEdit=isAuth&&!inactive;
                                                    return (
                                                        <tr key={emp.id} className={`border-b border-white/40 hover:bg-white/50 transition-colors ${inactive?'opacity-70 bg-gray-200/40':''}`}>
                                                            <td className="px-2 py-1 border-r border-white/40 font-black text-gray-900 text-[11px] sm:text-[13px] h-12 relative uppercase">
                                                                <div className="flex flex-col justify-center h-full">
                                                                    <span className="truncate">{emp.name}</span>
                                                                    {emp.isMandor && <span className="text-[9px] bg-blue-700 text-white px-1.5 py-0.5 rounded-sm w-max mt-0.5 font-black tracking-widest">MANDOR</span>}
                                                                    {inactive && <span className="text-[9px] text-orange-900 font-black w-max mt-0.5 bg-orange-400/50 px-1 rounded border border-orange-500/50">(NON-AKTIF)</span>}
                                                                </div>
                                                            </td>
                                                            {shownDates.map((date,di) => {
                                                                const val=inputs[`${date}_${emp.id}`];
                                                                const sun=formatShortDate(date).day==='Min';
                                                                return (
                                                                    <td key={date} className={`border-r border-white/40 p-0 h-12 relative ${sun?'bg-red-500/10':''}`}>
                                                                        {canEdit
                                                                            ? <input id={`inp-${date}-${idx}`} type="number" min="0" step="0.5" tabIndex={(di*visible.length)+idx+1} enterKeyHint="next"
                                                                                value={(!val||val===0)?'':val}
                                                                                onFocus={()=>onFocus(emp.id,date)}
                                                                                onChange={e=>onChange(emp.id,date,e.target.value)}
                                                                                onBlur={()=>onBlur(emp.id,date)}
                                                                                onKeyDown={e=>onKeyDown(e,date,idx)}
                                                                                className={`w-full h-full absolute inset-0 text-center focus:bg-white/70 focus:ring-inset focus:ring-2 focus:ring-blue-600 bg-transparent font-black text-[14px] sm:text-base outline-none ${emp.isMandor?'text-blue-900':'text-gray-900'}`}/>
                                                                            : <div className={`w-full h-full absolute inset-0 flex items-center justify-center font-black text-[14px] sm:text-base ${emp.isMandor?'text-blue-900':inactive?'text-gray-400':'text-gray-900'}`}>{(val&&val!==0)?val:'-'}</div>
                                                                        }
                                                                    </td>
                                                                );
                                                            })}
                                                            {showTotal && <td className="border-l-2 border-white/50 text-center font-black text-indigo-900 bg-indigo-200/50 text-xs sm:text-[15px]">{getTotal(emp.id,cycleDates)||'-'}</td>}
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── KARYAWAN ── */}
                        {tab==='karyawan' && isAuth && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                                <div className="bg-white/40 backdrop-blur-md p-5 rounded-2xl shadow-xl border border-white/50">
                                    <h2 className="text-base font-black mb-4 flex items-center gap-2 uppercase text-gray-900"><Users className="w-5 h-5 text-blue-700"/> Tambah Karyawan</h2>
                                    <form onSubmit={addEmp} className="flex flex-col gap-3">
                                        <div className="flex gap-2">
                                            <input type="text" value={newEmpName} onChange={e=>setNewEmpName(e.target.value.toUpperCase())} placeholder="NAMA LENGKAP..." className="flex-1 border-2 border-white/60 rounded-xl px-4 py-2.5 text-sm font-black uppercase outline-none bg-white/50 focus:bg-white/80 focus:border-blue-500 text-gray-900 placeholder-gray-600"/>
                                            <button type="submit" disabled={!newEmpName.trim()} className="bg-blue-600/90 text-white px-4 py-2.5 rounded-xl font-black uppercase shadow-md disabled:opacity-50">Simpan</button>
                                        </div>
                                        <label className="flex items-center gap-2 text-sm font-black text-gray-900 cursor-pointer bg-white/50 w-max px-3 py-1.5 rounded-lg border border-white/50">
                                            <input type="checkbox" checked={newEmpMandor} onChange={e=>setNewEmpMandor(e.target.checked)} className="w-4 h-4"/>
                                            JADIKAN <span className="text-blue-800">MANDOR</span>
                                        </label>
                                    </form>
                                </div>
                                <div className="bg-white/40 backdrop-blur-md p-5 rounded-2xl shadow-xl border border-white/50">
                                    <h2 className="text-base font-black mb-4 uppercase text-gray-900 border-b-2 border-white/40 pb-2">Karyawan Aktif ({actives.length})</h2>
                                    <div className="space-y-2 max-h-[250px] overflow-y-auto pr-1">
                                        {actives.map(emp => (
                                            <div key={emp.id} className={`flex justify-between items-center p-3 border-2 rounded-xl transition-all backdrop-blur-sm ${emp.isMandor?'bg-blue-400/30 border-blue-400/50':'bg-white/50 border-white/50 hover:bg-white/70'}`}>
                                                <span className="font-black text-sm uppercase text-gray-900 flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-2">
                                                    {emp.name}
                                                    {emp.isMandor && <span className="text-[10px] bg-blue-700 text-white px-1.5 py-0.5 rounded uppercase font-black">Mandor</span>}
                                                </span>
                                                <div className="flex gap-2">
                                                    <button onClick={()=>toggleMandor(emp.id,emp.isMandor)} className={`px-2.5 py-1.5 rounded-lg text-xs font-bold border-2 ${emp.isMandor?'bg-white/80 border-blue-400 text-blue-800':'bg-white/40 border-white/50 text-gray-800'}`} title={emp.isMandor?"Cabut Mandor":"Jadikan Mandor"}><Shield className="w-4 h-4"/></button>
                                                    <button onClick={()=>toggleActive(emp.id,true)} className="text-orange-900 bg-orange-400/50 border border-orange-300/50 px-2.5 py-1.5 rounded-lg text-xs font-bold" title="Pindah Proyek"><UserMinus className="w-4 h-4"/></button>
                                                    <button onClick={()=>delEmp(emp.id)} className="text-white bg-red-600/80 p-1.5 rounded-lg hover:bg-red-700"><Trash2 className="w-4 h-4"/></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    {inactives.length > 0 && (
                                        <div className="mt-6 border-t-2 border-white/40 pt-4">
                                            <h2 className="text-xs font-black mb-3 text-gray-900 uppercase tracking-widest">Di Proyek Lain ({inactives.length})</h2>
                                            <div className="space-y-2 max-h-[200px] overflow-y-auto pr-1">
                                                {inactives.map(emp => (
                                                    <div key={emp.id} className="flex justify-between items-center p-3 border-2 border-dashed border-gray-600/30 rounded-xl bg-gray-400/30 backdrop-blur-sm">
                                                        <span className="font-black text-sm text-gray-800 line-through uppercase">{emp.name}</span>
                                                        <div className="flex gap-2">
                                                            <button onClick={()=>toggleActive(emp.id,false)} className="text-green-900 bg-green-400/60 border border-green-300/50 px-3 py-1.5 rounded-lg text-xs font-black uppercase flex items-center gap-1"><UserPlus className="w-4 h-4"/><span className="hidden sm:inline">Aktifkan</span></button>
                                                            <button onClick={()=>delEmp(emp.id)} className="text-white bg-red-600/80 p-1.5 rounded-lg hover:bg-red-700"><Trash2 className="w-4 h-4"/></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ── SIKLUS ── */}
                        {tab==='siklus' && isAuth && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                                <div className="bg-white/40 backdrop-blur-md p-5 rounded-2xl shadow-xl border border-white/50">
                                    <h2 className="text-base font-black mb-2 flex items-center gap-2 uppercase text-gray-900"><CalendarDays className="w-5 h-5 text-indigo-700"/> Buat Siklus (14 Hari)</h2>
                                    <form onSubmit={createCycle} className="space-y-4 mt-4">
                                        <input type="date" value={newCycleStart} onChange={e=>setNewCycleStart(e.target.value)} required className="w-full border-2 border-white/60 rounded-xl px-4 py-3 text-sm font-black outline-none bg-white/50 focus:bg-white/80 focus:border-indigo-500 text-gray-900 shadow-inner"/>
                                        <button type="submit" className="w-full bg-gray-900/90 text-white text-sm font-black uppercase tracking-widest py-3 rounded-xl flex justify-center items-center gap-2 shadow-lg hover:bg-black"><Save className="w-4 h-4"/> Simpan & Aktifkan</button>
                                    </form>
                                </div>
                                <div className="bg-white/40 backdrop-blur-md p-5 rounded-2xl shadow-xl border border-white/50">
                                    <h2 className="text-base font-black mb-4 uppercase text-gray-900 border-b-2 border-white/40 pb-2">Riwayat Siklus</h2>
                                    <div className="space-y-3 max-h-[300px] overflow-y-auto pr-1">
                                        {cycles.map(c => (
                                            <div key={c.id} className="p-4 border-2 border-white/50 rounded-xl bg-white/50 backdrop-blur-sm hover:bg-white/70">
                                                <div className="text-sm font-black text-gray-900 uppercase">{new Date(c.startDate).toLocaleDateString('id-ID',{day:'numeric',month:'short'})} s/d {new Date(c.endDate).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}</div>
                                                <div className="text-xs font-black text-indigo-800 mt-1 uppercase">Gajian: {new Date(c.payDate).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="w-full text-center pb-6 pt-2 mt-auto z-10">
                        <p className="text-[10px] sm:text-xs font-black text-white drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] tracking-widest uppercase">
                            &copy; {new Date().getFullYear()} BAYU SATRIO. HAK CIPTA DILINDUNGI.
                        </p>
                    </footer>

                    {/* Notifikasi */}
                    {!!expStatus && (
                        <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 backdrop-blur-md text-white p-4 rounded-2xl shadow-2xl z-[200] flex items-center gap-3 w-[90%] max-w-sm border border-white/20
                            ${expStatus==='exporting'?'bg-yellow-500/95':expStatus==='done'?'bg-green-600/95':'bg-red-600/95'}`}>
                            {expStatus==='exporting'&&<Clock className="w-5 h-5 animate-spin flex-shrink-0"/>}
                            {expStatus==='done'&&<CheckCircle className="w-5 h-5 flex-shrink-0"/>}
                            {expStatus==='error'&&<AlertCircle className="w-5 h-5 flex-shrink-0"/>}
                            <div>
                                {expStatus==='exporting'&&<><p className="font-black text-sm uppercase">Membuat Gambar...</p><p className="text-xs opacity-80">Mohon tunggu sebentar</p></>}
                                {expStatus==='done'&&<><p className="font-black text-sm uppercase">Berhasil! WA Boss Dibuka</p><p className="text-xs opacity-80">Attach gambar dari galeri lalu kirim ke boss</p></>}
                                {expStatus==='error'&&<><p className="font-black text-sm uppercase">Export Gagal</p><p className="text-xs opacity-80">Coba lagi atau screenshot manual</p></>}
                            </div>
                        </div>
                    )}

                    {/* ══════════════════════════════════════════════════
                        EXPORT CAPTURE AREA — Portrait 9:16, 390px
                        Row height & font size adaptif sesuai jml karyawan
                    ══════════════════════════════════════════════════ */}
                    {cycleDates.length>0 && activeCycle && isAuth && (
                        <div id="joko-export" ref={exportRef}
                            style={{width:`${EW}px`,background:'#fff',fontFamily:'Arial,sans-serif',
                                    padding:`16px ${PAD}px`,boxSizing:'border-box',color:'#000'}}>

                            {/* Header laporan */}
                            <div style={{textAlign:'center',borderBottom:'3px solid #1e3a8a',paddingBottom:'8px',marginBottom:'10px'}}>
                                <div style={{fontSize:'13px',fontWeight:'900',textTransform:'uppercase',color:'#1e3a8a',letterSpacing:'1px'}}>
                                    LAPORAN ABSENSI KARYAWAN
                                </div>
                                <div style={{fontSize:'8px',fontWeight:'700',color:'#374151',marginTop:'2px'}}>
                                    PERIODE:&nbsp;
                                    {new Date(activeCycle.startDate).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}).toUpperCase()}
                                    &nbsp;—&nbsp;
                                    {new Date(activeCycle.endDate).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}).toUpperCase()}
                                </div>
                                <div style={{fontSize:'7px',color:'#9ca3af',marginTop:'1px'}}>
                                    Dicetak: {new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
                                </div>
                            </div>

                            {/* Tabel FULL 2 minggu */}
                            <table style={{width:'100%',borderCollapse:'collapse',tableLayout:'fixed'}}>
                                <colgroup>
                                    <col style={{width:`${NC}px`}}/>
                                    {cycleDates.map(d=><col key={d} style={{width:`${DC}px`}}/>)}
                                    <col style={{width:`${TC}px`}}/>
                                </colgroup>
                                <thead>
                                    <tr>
                                        <th style={{backgroundColor:'#dbeafe',border:'1px solid #1e3a8a',padding:'3px 4px',textAlign:'left',fontWeight:'900',color:'#1e3a8a',fontSize:`${nfSz}px`,textTransform:'uppercase'}}>NAMA</th>
                                        {cycleDates.map(date=>{
                                            const {day,date:dn}=formatShortDate(date); const sun=day==='Min';
                                            return <th key={`h-${date}`} style={{backgroundColor:sun?'#fecaca':'#eff6ff',border:'1px solid #1e3a8a',padding:'2px 0',textAlign:'center',fontWeight:'900',color:sun?'#991b1b':'#1e3a8a'}}>
                                                <div style={{fontSize:'6px',lineHeight:'1.2'}}>{day}</div>
                                                <div style={{fontSize:`${cfSz}px`,fontWeight:'900',lineHeight:'1.3'}}>{dn}</div>
                                            </th>;
                                        })}
                                        <th style={{backgroundColor:'#4f46e5',border:'1px solid #1e3a8a',padding:'2px 1px',textAlign:'center',fontWeight:'900',color:'#fff',fontSize:`${nfSz-1}px`}}>
                                            TOT<br/>JAM
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {visible.map((emp,idx)=>{
                                        const tot=getTotal(emp.id,cycleDates);
                                        return (
                                            <tr key={`er-${emp.id}`} style={{backgroundColor:idx%2===0?'#f9fafb':'#fff'}}>
                                                <td style={{border:'1px solid #9ca3af',padding:'2px 4px',height:`${rowH}px`,fontWeight:'900',color:emp.isMandor?'#1e3a8a':'#111827',fontSize:`${nfSz}px`,lineHeight:'1.2',verticalAlign:'middle',wordBreak:'break-word',overflowWrap:'break-word'}}>
                                                    {emp.name}
                                                    {emp.isMandor&&<span style={{display:'inline-block',marginLeft:'2px',fontSize:'5.5px',background:'#1e40af',color:'#fff',padding:'1px 2px',borderRadius:'2px',fontWeight:'900',verticalAlign:'middle'}}>MDR</span>}
                                                    {emp.isActive===false&&<span style={{display:'block',fontSize:'6px',color:'#d97706',fontWeight:'700'}}>NON-AKTIF</span>}
                                                </td>
                                                {cycleDates.map(date=>{
                                                    const val=attendance[date]?.[emp.id];
                                                    const sun=formatShortDate(date).day==='Min';
                                                    return <td key={`ec-${date}`} style={{border:'1px solid #d1d5db',padding:'0',height:`${rowH}px`,textAlign:'center',fontWeight:'700',color:emp.isMandor?'#1e3a8a':'#111827',fontSize:`${cfSz}px`,backgroundColor:sun?'#fef2f2':'transparent',verticalAlign:'middle'}}>
                                                        {(val&&val!==0)?val:''}
                                                    </td>;
                                                })}
                                                <td style={{border:'1px solid #9ca3af',padding:'0',height:`${rowH}px`,textAlign:'center',fontWeight:'900',color:'#4f46e5',backgroundColor:'#eef2ff',fontSize:`${cfSz}px`,verticalAlign:'middle'}}>
                                                    {tot||''}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                    {/* Grand total row */}
                                    <tr>
                                        <td style={{border:'1px solid #1e3a8a',padding:'3px 4px',textAlign:'right',fontWeight:'900',backgroundColor:'#dbeafe',color:'#1e3a8a',fontSize:`${nfSz-1}px`,textTransform:'uppercase'}}>
                                            GRAND TOTAL
                                        </td>
                                        {cycleDates.map(date=>{
                                            const dt=visible.reduce((s,e)=>s+(parseFloat(attendance[date]?.[e.id])||0),0);
                                            return <td key={`gt-${date}`} style={{border:'1px solid #1e3a8a',padding:'2px 0',textAlign:'center',fontWeight:'900',backgroundColor:'#dbeafe',color:'#1e3a8a',fontSize:`${cfSz-1}px`,verticalAlign:'middle'}}>
                                                {dt||''}
                                            </td>;
                                        })}
                                        <td style={{border:'1px solid #1e3a8a',padding:'2px 1px',textAlign:'center',fontWeight:'900',backgroundColor:'#4f46e5',color:'#fff',fontSize:`${cfSz}px`,verticalAlign:'middle'}}>
                                            {visible.reduce((s,e)=>s+getTotal(e.id,cycleDates),0)}
                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                            {/* Tanda tangan */}
                            <div style={{marginTop:'14px',display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
                                <div style={{textAlign:'center',minWidth:'130px'}}>
                                    <div style={{fontSize:'7px',fontWeight:'700',color:'#374151',marginBottom:'26px'}}>DIBUAT OLEH,</div>
                                    <div style={{borderBottom:'1.5px solid #374151',width:'120px',margin:'0 auto'}}/>
                                    <div style={{fontSize:'8px',fontWeight:'900',marginTop:'3px',color:'#111827',textTransform:'uppercase'}}>
                                        {mandor ? mandor.name : 'ADMIN / MANDOR'}
                                    </div>
                                    {mandor && <div style={{fontSize:'6.5px',color:'#6b7280',fontWeight:'700',marginTop:'1px'}}>MANDOR</div>}
                                </div>
                                <div style={{textAlign:'center',minWidth:'130px'}}>
                                    <div style={{fontSize:'7px',fontWeight:'700',color:'#374151',marginBottom:'26px'}}>DIKETAHUI OLEH,</div>
                                    <div style={{borderBottom:'1.5px solid #374151',width:'120px',margin:'0 auto'}}/>
                                    <div style={{fontSize:'8px',fontWeight:'900',marginTop:'3px',color:'#111827',textTransform:'uppercase'}}>PIMPINAN / BADAN USAHA</div>
                                </div>
                            </div>

                            <div style={{textAlign:'center',marginTop:'10px',fontSize:'6.5px',color:'#d1d5db',borderTop:'1px solid #e5e7eb',paddingTop:'5px'}}>
                                &copy; {new Date().getFullYear()} BAYU SATRIO — SISTEM ABSENSI JOKO
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
