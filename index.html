<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joko Absensi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- html2canvas untuk export gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { Settings, Users, Plus, Save, Clock, CheckCircle, LayoutDashboard, Trash2, CalendarDays, Printer, X, AlertCircle, LogOut, Lock, User as UserIcon, ArrowLeft, UserMinus, UserPlus, Shield, Image, Send } from 'https://esm.sh/lucide-react@0.344.0';
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js';

        // ==========================================
        const GITHUB_USERNAME = "oktetod"; 
        const GITHUB_REPO = "webpos";
        const WA_BOSS_NUMBER = "+6285815042276"; // Nomor boss
        // ==========================================

        const firebaseConfig = {
            apiKey: "AIzaSyA9aXzUB7rnwNEAe7XIWl1ym1PDSFevMhg",
            authDomain: "absen-2b38f.firebaseapp.com",
            projectId: "absen-2b38f",
            storageBucket: "absen-2b38f.firebasestorage.app",
            messagingSenderId: "696925605556",
            appId: "1:696925605556:web:7be8b9429cf58f5e4091e1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const myAppId = 'joko-absen-app';

        function App() {
            const [user, setUser] = useState(null);
            const [bgImages, setBgImages] = useState([]);
            const [currentBgIndex, setCurrentBgIndex] = useState(0);
            const [isAuthenticated, setIsAuthenticated] = useState(localStorage.getItem('joko_admin_logged_in') === 'true');
            const [showLoginForm, setShowLoginForm] = useState(false);
            const [loginUser, setLoginUser] = useState('');
            const [loginPass, setLoginPass] = useState('');
            const [loginError, setLoginError] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [employees, setEmployees] = useState([]);
            const [cycles, setCycles] = useState([]);
            const [selectedCycleId, setSelectedCycleId] = useState('');
            const [allAttendance, setAllAttendance] = useState({});
            const [localInputs, setLocalInputs] = useState({});
            const [activeInputKey, setActiveInputKey] = useState(null); // BUG FIX: track active input
            const [viewWeek, setViewWeek] = useState(1); 
            const [exportStatus, setExportStatus] = useState(''); // 'idle' | 'exporting' | 'done' | 'error'
            const [newEmpName, setNewEmpName] = useState('');
            const [newEmpIsMandor, setNewEmpIsMandor] = useState(false);
            const [newCycleStart, setNewCycleStart] = useState('');
            const exportTableRef = useRef(null);

            // GitHub slideshow
            useEffect(() => {
                const fetchImagesFromGitHub = async () => {
                    try {
                        const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/`);
                        const data = await response.json();
                        if (Array.isArray(data)) {
                            const imageFiles = data
                                .filter(item => item.type === "file" && /\.(jpg|jpeg|png)$/i.test(item.name))
                                .map(item => item.download_url);
                            if (imageFiles.length > 0) setBgImages(imageFiles);
                        }
                    } catch (error) {
                        console.error("Gagal mengambil gambar GitHub:", error);
                    }
                };
                fetchImagesFromGitHub();
            }, []);

            useEffect(() => {
                if (bgImages.length === 0) return;
                const id = setInterval(() => {
                    setCurrentBgIndex(prev => (prev + 1) % bgImages.length);
                }, 10000);
                return () => clearInterval(id);
            }, [bgImages]);

            useEffect(() => {
                signInAnonymously(auth).catch(err => console.error("Auth Error:", err));
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const empRef = collection(db, 'artifacts', myAppId, 'public', 'data', 'employees');
                const unsubEmp = onSnapshot(empRef, snap => {
                    setEmployees(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const cycleRef = collection(db, 'artifacts', myAppId, 'public', 'data', 'cycles');
                const unsubCycle = onSnapshot(cycleRef, snap => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    data.sort((a, b) => new Date(b.startDate) - new Date(a.startDate));
                    setCycles(data);
                    setSelectedCycleId(prev => (!prev && data.length > 0) ? data[0].id : prev);
                });
                const attRef = collection(db, 'artifacts', myAppId, 'public', 'data', 'attendance');
                const unsubAtt = onSnapshot(attRef, snap => {
                    const data = {};
                    snap.forEach(d => { data[d.id] = d.data(); });
                    setAllAttendance(data);
                });
                return () => { unsubEmp(); unsubCycle(); unsubAtt(); };
            }, [user]);

            // BUG FIX: Hanya sync localInputs dari DB untuk key yang TIDAK sedang aktif diedit
            useEffect(() => {
                setLocalInputs(prev => {
                    const next = { ...prev };
                    Object.keys(allAttendance).forEach(date => {
                        Object.keys(allAttendance[date]).forEach(empId => {
                            const key = `${date}_${empId}`;
                            // Jangan overwrite jika sedang aktif diedit
                            if (key !== activeInputKey) {
                                next[key] = allAttendance[date][empId];
                            }
                        });
                    });
                    return next;
                });
            }, [allAttendance]); // Sengaja tidak include activeInputKey di dep

            const handleAddEmployee = async (e) => {
                e.preventDefault();
                if (!newEmpName.trim() || !user || !isAuthenticated) return;
                await addDoc(collection(db, 'artifacts', myAppId, 'public', 'data', 'employees'), { 
                    name: newEmpName.toUpperCase(), isActive: true, isMandor: newEmpIsMandor,
                    createdAt: new Date().toISOString() 
                });
                setNewEmpName('');
                setNewEmpIsMandor(false);
            };

            const handleDeleteEmployee = async (empId) => {
                if (user && isAuthenticated && window.confirm("Yakin ingin menghapus data ini selamanya?")) {
                    await deleteDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'employees', empId));
                }
            };

            const handleToggleActive = async (empId, currentStatus) => {
                if (!user || !isAuthenticated) return;
                await setDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'employees', empId), { isActive: !currentStatus }, { merge: true });
            };

            const handleToggleMandor = async (empId, currentStatus) => {
                if (!user || !isAuthenticated) return;
                await setDoc(doc(db, 'artifacts', myAppId, 'public', 'data', 'employees', empId), { isMandor: !currentStatus }, { merge: true });
            };

            const handleCreateCycle = async (e) => {
                e.preventDefault();
                if (!newCycleStart || !user || !isAuthenticated) return;
                const start = new Date(newCycleStart);
                const end = new Date(start); end.setDate(end.getDate() + 13);
                const payDay = new Date(start); payDay.setDate(payDay.getDate() + 14);
                await addDoc(collection(db, 'artifacts', myAppId, 'public', 'data', 'cycles'), {
                    startDate: start.toISOString().split('T')[0],
                    endDate: end.toISOString().split('T')[0],
                    payDate: payDay.toISOString().split('T')[0],
                    createdAt: new Date().toISOString()
                });
                setNewCycleStart('');
            };

            // BUG FIX: track key aktif saat focus
            const handleInputFocus = (empId, date) => {
                setActiveInputKey(`${date}_${empId}`);
            };

            const handleInputChange = (empId, date, val) => {
                if (!isAuthenticated) return;
                setLocalInputs(prev => ({ ...prev, [`${date}_${empId}`]: val }));
            };

            // BUG FIX: handle kosong/NaN dengan benar
            const handleInputBlur = async (empId, date) => {
                if (!user || !isAuthenticated) return;
                setActiveInputKey(null);
                const rawVal = localInputs[`${date}_${empId}`];
                const val = parseFloat(rawVal);
                const attRef = doc(db, 'artifacts', myAppId, 'public', 'data', 'attendance', date);
                const saveVal = (!rawVal || rawVal === '' || isNaN(val)) ? 0 : val;
                await setDoc(attRef, { [empId]: saveVal }, { merge: true });
                // Sync local state dengan nilai yang tersimpan
                setLocalInputs(prev => ({ ...prev, [`${date}_${empId}`]: saveVal === 0 ? '' : saveVal }));
            };

            const handleKeyDown = (e, date, rowIndex) => {
                if (!isAuthenticated) return;
                if (e.key === 'Enter' || e.keyCode === 13) {
                    e.preventDefault();
                    const nextInput = document.getElementById(`input-${date}-${rowIndex + 1}`);
                    if (nextInput) { nextInput.focus(); nextInput.select(); }
                    else e.target.blur();
                }
            };

            const getRowTotal = (empId, allDates) => {
                return allDates.reduce((total, date) => total + (parseFloat(allAttendance[date]?.[empId]) || 0), 0);
            };

            const getCycleDates = () => {
                const cycle = cycles.find(c => c.id === selectedCycleId);
                if (!cycle) return [];
                const dates = [];
                let curr = new Date(cycle.startDate);
                const end = new Date(cycle.endDate);
                while (curr <= end) { dates.push(curr.toISOString().split('T')[0]); curr.setDate(curr.getDate() + 1); }
                return dates;
            };

            const cycleDates = getCycleDates();
            const activeCycleObj = cycles.find(c => c.id === selectedCycleId);
            const isMultiWeek = cycleDates.length > 7;
            const displayedDates = isMultiWeek ? cycleDates.slice((viewWeek - 1) * 7, viewWeek * 7) : cycleDates;
            const showTotalColumn = !isMultiWeek || viewWeek === 2;

            const sortedEmployees = [...employees].sort((a, b) => {
                if (a.isMandor && !b.isMandor) return -1;
                if (!a.isMandor && b.isMandor) return 1;
                return a.name.localeCompare(b.name);
            });

            // BUG FIX: visibleEmployees hanya tampil jika aktif ATAU punya riwayat jam di siklus ini
            const visibleEmployees = sortedEmployees.filter(emp => {
                if (emp.isActive !== false) return true;
                return getRowTotal(emp.id, cycleDates) > 0;
            });

            const activeEmployees = sortedEmployees.filter(e => e.isActive !== false);
            const inactiveEmployees = sortedEmployees.filter(e => e.isActive === false);

            const formatShortDate = (dateString) => {
                const date = new Date(dateString);
                const days = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
                return { day: days[date.getDay()], date: date.getDate() };
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUser.toLowerCase() === 'bayu' && loginPass === '008') {
                    setIsAuthenticated(true);
                    localStorage.setItem('joko_admin_logged_in', 'true');
                    setLoginError('');
                    setShowLoginForm(false);
                } else {
                    setLoginError('Username atau Password salah!');
                }
            };

            const handleLogout = () => {
                setIsAuthenticated(false);
                localStorage.removeItem('joko_admin_logged_in');
                setLoginUser(''); setLoginPass('');
                setActiveTab('dashboard');
            };

            // =====================================================
            // FITUR BARU: Export as Image + Kirim ke WhatsApp Boss
            // =====================================================
            const handleExportAndSendWA = async () => {
                if (!exportTableRef.current || cycleDates.length === 0) return;
                setExportStatus('exporting');

                try {
                    // Paksa tampilkan export div sementara untuk di-capture
                    const exportEl = exportTableRef.current;
                    exportEl.style.left = '-9999px';
                    exportEl.style.visibility = 'visible';
                    exportEl.style.position = 'fixed';

                    const canvas = await window.html2canvas(exportEl, {
                        scale: 2,
                        backgroundColor: '#ffffff',
                        useCORS: true,
                        logging: false,
                        width: exportEl.scrollWidth,
                        height: exportEl.scrollHeight,
                        windowWidth: exportEl.scrollWidth,
                        windowHeight: exportEl.scrollHeight,
                    });

                    // Sembunyikan lagi
                    exportEl.style.left = '-99999px';
                    exportEl.style.visibility = 'hidden';

                    // Konversi ke Blob PNG
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 1.0));
                    const fileName = `absensi_${activeCycleObj ? activeCycleObj.startDate : 'export'}.png`;
                    const file = new File([blob], fileName, { type: 'image/png' });

                    // Coba Web Share API (mobile - bisa langsung share ke WA)
                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'Laporan Absensi Karyawan',
                                text: `Laporan absensi periode ${activeCycleObj ? activeCycleObj.startDate + ' s/d ' + activeCycleObj.endDate : ''}`
                            });
                            setExportStatus('done');
                            setTimeout(() => setExportStatus(''), 4000);
                            return;
                        } catch (shareErr) {
                            // User cancel atau tidak support, fallback ke download
                            console.log('Share cancelled, fallback ke download:', shareErr);
                        }
                    }

                    // Fallback: Download file + buka WhatsApp
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    // Buka WhatsApp ke boss setelah download (delay agar download sempat jalan)
                    setTimeout(() => {
                        const waUrl = `https://wa.me/${WA_BOSS_NUMBER.replace(/[^0-9]/g, '')}?text=${encodeURIComponent('Halo Boss, berikut laporan absensi karyawan. Gambar sudah terdownload, silakan attach dari galeri.')}`;
                        window.open(waUrl, '_blank');
                    }, 1200);

                    setExportStatus('done');
                    setTimeout(() => setExportStatus(''), 5000);

                } catch (err) {
                    console.error('Export gagal:', err);
                    setExportStatus('error');
                    setTimeout(() => setExportStatus(''), 4000);
                }
            };

            if (!user) return (
                <div className="flex items-center justify-center h-screen bg-gray-50">
                    <div className="text-lg font-medium text-blue-600 animate-pulse flex items-center gap-2">
                        <Clock className="w-6 h-6 animate-spin" /> Memuat Sistem...
                    </div>
                </div>
            );

            const currentBgUrl = bgImages.length > 0 ? bgImages[currentBgIndex] : '';
            const backgroundStyle = {
                backgroundImage: currentBgUrl ? `url('${currentBgUrl}')` : 'none',
                backgroundSize: 'cover', backgroundPosition: 'center',
                backgroundRepeat: 'no-repeat',
                transition: 'background-image 1.5s ease-in-out',
                backgroundColor: '#f3f4f6'
            };

            // Halaman Login
            if (showLoginForm && !isAuthenticated) {
                return (
                    <div className="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 font-sans relative overflow-hidden">
                        <div className="fixed inset-0 z-[-2] w-full h-full" style={backgroundStyle}></div>
                        <div className="fixed inset-0 z-[-1] bg-black/20"></div>
                        <div className="absolute top-4 left-4 z-10">
                            <button onClick={() => setShowLoginForm(false)} className="flex items-center gap-2 text-white hover:text-gray-200 font-bold bg-white/20 backdrop-blur-md px-4 py-2 rounded-xl shadow-sm border border-white/40">
                                <ArrowLeft className="w-5 h-5" /> Kembali
                            </button>
                        </div>
                        <div className="sm:mx-auto sm:w-full sm:max-w-md mt-8 z-10">
                            <div className="flex justify-center">
                                <div className="bg-gradient-to-br from-blue-600/90 to-indigo-600/90 backdrop-blur-md p-4 rounded-2xl text-white shadow-lg border border-white/30"><Lock className="w-10 h-10" /></div>
                            </div>
                            <h2 className="mt-6 text-center text-3xl font-black text-white tracking-tight uppercase drop-shadow-lg">Login Admin</h2>
                            <p className="mt-2 text-center text-sm font-bold text-gray-100 drop-shadow-md">Masukkan kredensial untuk mengedit absensi</p>
                        </div>
                        <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md px-4 sm:px-0 z-10">
                            <div className="bg-white/30 backdrop-blur-md py-8 px-6 shadow-2xl sm:rounded-2xl sm:px-10 border border-white/50">
                                <form className="space-y-6" onSubmit={handleLogin}>
                                    {loginError && (
                                        <div className="bg-red-500/80 backdrop-blur-sm border-l-4 border-red-200 p-4 rounded-md flex items-start gap-3">
                                            <AlertCircle className="w-5 h-5 text-white flex-shrink-0" />
                                            <p className="text-sm text-white font-bold">{loginError}</p>
                                        </div>
                                    )}
                                    <div>
                                        <label className="block text-sm font-black text-white mb-1.5 uppercase tracking-wide drop-shadow-md">Username</label>
                                        <div className="relative rounded-xl shadow-sm">
                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><UserIcon className="h-5 w-5 text-gray-700" /></div>
                                            <input type="text" required value={loginUser} onChange={(e) => setLoginUser(e.target.value)} className="focus:ring-2 focus:ring-blue-500 focus:bg-white/90 block w-full pl-10 sm:text-sm border-white/50 rounded-xl py-3.5 bg-white/60 backdrop-blur-sm border outline-none transition-all font-black text-gray-900 uppercase placeholder-gray-600" placeholder="Ketik username..." />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-black text-white mb-1.5 uppercase tracking-wide drop-shadow-md">Password</label>
                                        <div className="relative rounded-xl shadow-sm">
                                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><Lock className="h-5 w-5 text-gray-700" /></div>
                                            <input type="password" required value={loginPass} onChange={(e) => setLoginPass(e.target.value)} className="focus:ring-2 focus:ring-blue-500 focus:bg-white/90 block w-full pl-10 sm:text-sm border-white/50 rounded-xl py-3.5 bg-white/60 backdrop-blur-sm border outline-none transition-all font-black text-gray-900 placeholder-gray-600" placeholder="Ketik password..." />
                                        </div>
                                    </div>
                                    <button type="submit" className="w-full flex justify-center py-3.5 px-4 border border-white/30 rounded-xl shadow-lg text-sm font-black text-white bg-blue-600/80 hover:bg-blue-700/90 backdrop-blur-md transition-all mt-4 uppercase tracking-wider">MASUK</button>
                                </form>
                            </div>
                        </div>
                        <div className="absolute bottom-6 w-full text-center z-10">
                            <p className="text-[10px] sm:text-xs font-black text-white drop-shadow-lg tracking-widest uppercase">&copy; {new Date().getFullYear()} BAYU SATRIO. HAK CIPTA DILINDUNGI.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen font-sans flex flex-col relative overflow-hidden">
                    <div className="fixed inset-0 z-[-2] w-full h-full" style={backgroundStyle}></div>
                    <div className="fixed inset-0 z-[-1] bg-black/10"></div>

                    <style>{`
                        input[type=number]::-webkit-inner-spin-button,
                        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
                        input[type=number] { -moz-appearance: textfield; }
                        /* Export table: selalu tersembunyi kecuali saat di-render html2canvas */
                        #export-capture-area {
                            position: fixed;
                            left: -99999px;
                            top: 0;
                            visibility: hidden;
                            background: white;
                            font-family: Arial, sans-serif;
                            width: 1100px;
                            padding: 24px;
                            box-sizing: border-box;
                        }
                    `}</style>

                    {/* HEADER */}
                    <header className="bg-white/30 backdrop-blur-md shadow-lg sticky top-0 z-50 border-b border-white/50">
                        <div className="max-w-7xl mx-auto px-2 sm:px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600/90 backdrop-blur-sm p-2 rounded-xl text-white shadow-md border border-white/20"><CalendarDays className="w-5 h-5" /></div>
                                <h1 className="text-lg font-black text-gray-900 hidden sm:block tracking-tight uppercase drop-shadow-[0_1px_1px_rgba(255,255,255,0.8)]">Joko<span className="text-blue-800">Absensi</span></h1>
                            </div>
                            <div className="flex items-center gap-2 sm:gap-3">
                                <div className="flex space-x-1 sm:space-x-2 bg-white/20 p-1.5 rounded-2xl border border-white/40 shadow-inner backdrop-blur-sm">
                                    <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] sm:text-sm font-black transition-all duration-300 ${activeTab === 'dashboard' ? 'bg-blue-600/90 text-white shadow-md border border-white/20' : 'bg-transparent text-gray-800 hover:bg-white/40'}`}><LayoutDashboard className="w-3.5 h-3.5" /> Absen</button>
                                    {isAuthenticated && <button onClick={() => setActiveTab('karyawan')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] sm:text-sm font-black transition-all duration-300 ${activeTab === 'karyawan' ? 'bg-blue-600/90 text-white shadow-md border border-white/20' : 'bg-transparent text-gray-800 hover:bg-white/40'}`}><Users className="w-3.5 h-3.5" /> Karyawan</button>}
                                    {isAuthenticated && <button onClick={() => setActiveTab('siklus')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] sm:text-sm font-black transition-all duration-300 ${activeTab === 'siklus' ? 'bg-blue-600/90 text-white shadow-md border border-white/20' : 'bg-transparent text-gray-800 hover:bg-white/40'}`}><Settings className="w-3.5 h-3.5" /> Siklus</button>}
                                </div>
                                {isAuthenticated ? (
                                    <button onClick={handleLogout} className="bg-red-500/80 backdrop-blur-md border border-red-300/50 text-white p-2 rounded-xl hover:bg-red-600 transition-all shadow-md" title="Keluar"><LogOut className="w-4 h-4 sm:w-5 sm:h-5" /></button>
                                ) : (
                                    <button onClick={() => setShowLoginForm(true)} className="bg-blue-600/90 backdrop-blur-md border border-white/30 text-white px-3 py-1.5 rounded-xl hover:bg-blue-700 transition-all shadow-md text-xs sm:text-sm font-black flex items-center gap-1.5 uppercase tracking-wide"><Lock className="w-3.5 h-3.5" /> Admin</button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl mx-auto w-full px-2 sm:px-6 py-6 z-10 relative">
                        {/* DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="bg-white/40 backdrop-blur-md rounded-2xl shadow-2xl border border-white/60 overflow-hidden">
                                {!isAuthenticated && (
                                    <div className="bg-blue-900/80 backdrop-blur-md p-3 text-center text-sm font-black text-white border-b border-white/20 flex justify-center items-center gap-2 uppercase tracking-widest">
                                        <AlertCircle className="w-4 h-4" /> Mode Akses Publik (Hanya Baca)
                                    </div>
                                )}
                                <div className="p-4 sm:p-5 bg-white/30 border-b border-white/50 flex flex-col sm:flex-row justify-between items-center gap-4">

                                                    const isSun = day === 'Min';
                                                    return (
                                                        <td key={`ec-${date}`} style={{ border: '1px solid #9ca3af', padding: '3px 1px', textAlign: 'center', fontWeight: '700', color: emp.isMandor ? '#1e3a8a' : '#111827', backgroundColor: isSun ? '#fef2f2' : 'transparent' }}>
                                                            {(val && val !== 0) ? val : ''}
                                                        </td>
                                                    );
                                                })}
                                                <td style={{ border: '1px solid #9ca3af', padding: '3px 2px', textAlign: 'center', fontWeight: '900', color: '#4f46e5', backgroundColor: '#eef2ff' }}>
                                                    {total || ''}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                    {/* Baris total bawah */}
                                    <tr>
                                        <td colSpan="2" style={{ border: '1px solid #1e3a8a', padding: '4px 6px', textAlign: 'right', fontWeight: '900', backgroundColor: '#dbeafe', color: '#1e3a8a', fontSize: '9px', textTransform: 'uppercase' }}>GRAND TOTAL</td>
                                        {cycleDates.map(date => {
                                            const dayTotal = visibleEmployees.reduce((sum, emp) => sum + (parseFloat(allAttendance[date]?.[emp.id]) || 0), 0);
                                            return (
                                                <td key={`et-${date}`} style={{ border: '1px solid #1e3a8a', padding: '3px 1px', textAlign: 'center', fontWeight: '900', backgroundColor: '#dbeafe', color: '#1e3a8a', fontSize: '8px' }}>
                                                    {dayTotal || ''}
                                                </td>
                                            );
                                        })}
                                        <td style={{ border: '1px solid #1e3a8a', padding: '4px 2px', textAlign: 'center', fontWeight: '900', backgroundColor: '#4f46e5', color: 'white', fontSize: '9px' }}>
                                            {visibleEmployees.reduce((sum, emp) => sum + getRowTotal(emp.id, cycleDates), 0)}
                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                            {/* Area tanda tangan */}
                            <div style={{ marginTop: '24px', display: 'flex', justifyContent: 'space-between', paddingTop: '8px' }}>
                                <div style={{ textAlign: 'center', minWidth: '180px' }}>
                                    <p style={{ fontSize: '9px', fontWeight: '700', marginBottom: '40px', color: '#374151' }}>DIBUAT OLEH,</p>
                                    <div style={{ borderBottom: '1.5px solid #374151', width: '160px', margin: '0 auto' }}></div>
                                    <p style={{ fontSize: '9px', fontWeight: '900', marginTop: '4px', color: '#111827' }}>ADMIN / MANDOR</p>
                                </div>
                                <div style={{ textAlign: 'center', minWidth: '180px' }}>
                                    <p style={{ fontSize: '9px', fontWeight: '700', marginBottom: '40px', color: '#374151' }}>DIKETAHUI OLEH,</p>
                                    <div style={{ borderBottom: '1.5px solid #374151', width: '160px', margin: '0 auto' }}></div>
                                    <p style={{ fontSize: '9px', fontWeight: '900', marginTop: '4px', color: '#111827' }}>PIMPINAN / BADAN USAHA</p>
                                </div>
                            </div>
                            <div style={{ textAlign: 'center', marginTop: '16px', fontSize: '8px', color: '#9ca3af', borderTop: '1px solid #e5e7eb', paddingTop: '6px' }}>
                                © {new Date().getFullYear()} BAYU SATRIO — SISTEM ABSENSI JOKO
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
